<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accenture Intelligence Dashboard</title>
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html,body { margin:0; padding:0; background:#070d1a; color:#e2e8f0; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; min-height:100vh; }
    a { color:#3b82f6; text-decoration:none; }
    a:hover { text-decoration:underline; }
    @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @media (max-width: 900px) {
      .grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
      .grid-news { grid-template-columns: 1fr !important; }
    }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ====== CONFIG ======
    const FINNHUB_TOKEN = "d8k3fghr01qjgd6qvv0gd8k3fghr01qjgd6qvv10";
    const SYMBOL = "ACN";

    // ====== HELPERS ======
    const fmtMoney  = v => (typeof v === "number" && !isNaN(v)) ? `$${v.toFixed(2)}` : "—";
    const fmtDate   = ts => new Date(ts * 1000).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
    const monthAbbr = ["", "Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const fmtPeriod = p => {
      if (!p) return "";
      const [y, m] = p.split("-");
      return `${monthAbbr[+m] || m} '${(y || "").slice(2)}`;
    };

    const REC_COLORS = {
      strongBuy:  "#059669",
      buy:        "#10b981",
      hold:       "#f59e0b",
      sell:       "#f87171",
      strongSell: "#ef4444",
    };
    const REC_LABELS = {
      strongBuy:  "Strong Buy",
      buy:        "Buy",
      hold:       "Hold",
      sell:       "Sell",
      strongSell: "Strong Sell",
    };

    // ====== FETCH FUNCTIONS ======
    async function fetchPrice() {
      const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${SYMBOL}&token=${FINNHUB_TOKEN}`);
      if (!r.ok) throw new Error(`Finnhub quote HTTP ${r.status}`);
      const d = await r.json();
      if (typeof d.c !== "number" || d.c <= 0) throw new Error("Invalid price data");
      return { price:d.c, change:d.d, changePct:d.dp, high:d.h, low:d.l, open:d.o, prevClose:d.pc };
    }

    async function fetchNews() {
      const today = new Date();
      const monthAgo = new Date(today.getTime() - 30 * 86400000);
      const f = d => d.toISOString().split("T")[0];
      const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${SYMBOL}&from=${f(monthAgo)}&to=${f(today)}&token=${FINNHUB_TOKEN}`);
      if (!r.ok) throw new Error(`Finnhub news HTTP ${r.status}`);
      const arr = await r.json();
      return Array.isArray(arr) ? arr.slice(0, 8) : [];
    }

    async function fetchRecommendations() {
      const r = await fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${SYMBOL}&token=${FINNHUB_TOKEN}`);
      if (!r.ok) throw new Error(`Finnhub recommendation HTTP ${r.status}`);
      const arr = await r.json();
      if (!Array.isArray(arr)) return [];
      // Sort newest first, return up to 6 periods
      return arr
        .sort((a, b) => (b.period || "").localeCompare(a.period || ""))
        .slice(0, 6);
    }

    async function fetchPriceTarget() {
      const r = await fetch(`https://finnhub.io/api/v1/stock/price-target?symbol=${SYMBOL}&token=${FINNHUB_TOKEN}`);
      if (!r.ok) throw new Error(`Finnhub price-target HTTP ${r.status}`);
      return r.json();
    }

    async function fetchHistorical() {
      const yahooUrl = "https://query1.finance.yahoo.com/v8/finance/chart/ACN?interval=1mo&range=2y";

      const to = new Date();
      const from = new Date(to);
      from.setFullYear(to.getFullYear() - 2);
      const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
      const stooqUrl = `https://stooq.com/q/d/l/?s=acn.us&i=m&d1=${fmt(from)}&d2=${fmt(to)}`;

      // Proxies in current working syntax
      const proxies = [
        u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://api.codetabs.com/v1/proxy?quest=${u}`,
        u => `https://corsproxy.org/?${encodeURIComponent(u)}`,
      ];

      const parseYahoo = (j) => {
        const result = j && j.chart && j.chart.result && j.chart.result[0];
        if (!result) throw new Error("no chart.result");
        const ts = result.timestamp || [];
        const closes = (result.indicators && result.indicators.quote && result.indicators.quote[0] && result.indicators.quote[0].close) || [];
        const rows = ts.map((t, i) => {
          const c = closes[i];
          if (c == null || isNaN(c)) return null;
          const d = new Date(t * 1000);
          return { date: `${monthAbbr[d.getMonth() + 1]} '${String(d.getFullYear()).slice(2)}`, price: c, raw: t };
        }).filter(Boolean);
        if (rows.length < 4) throw new Error(`only ${rows.length} rows`);
        return rows;
      };

      const parseStooq = (csv) => {
        const rows = csv.trim().split("\n").slice(1).map(row => {
          const parts = row.split(",");
          const date = parts[0];
          const price = parseFloat(parts[4]);
          if (!date || isNaN(price) || price <= 0) return null;
          const [y, m] = date.split("-");
          return { date: `${monthAbbr[+m]} '${y.slice(2)}`, price, raw: date };
        }).filter(Boolean).sort((a, b) => a.raw > b.raw ? 1 : -1);
        if (rows.length < 4) throw new Error(`only ${rows.length} rows`);
        return rows;
      };

      const errors = [];

      // Attempt 1: Yahoo direct
      try {
        const r = await fetch(yahooUrl);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return parseYahoo(await r.json());
      } catch (e) { errors.push(`yahoo direct: ${e.message}`); }

      // Attempt 2: Yahoo via each proxy
      for (const px of proxies) {
        const name = px("X").split("/")[2];
        try {
          const r = await fetch(px(yahooUrl));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return parseYahoo(await r.json());
        } catch (e) { errors.push(`yahoo via ${name}: ${e.message}`); }
      }

      // Attempt 3: Stooq via each proxy
      for (const px of proxies) {
        const name = px("X").split("/")[2];
        try {
          const r = await fetch(px(stooqUrl));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return parseStooq(await r.text());
        } catch (e) { errors.push(`stooq via ${name}: ${e.message}`); }
      }

      throw new Error(errors.join(" | "));
    }

    // ====== UI HELPERS ======
    const Card = ({ children, style }) =>
      <div style={{ background:"#0f1825", border:"1px solid #1a2744", borderRadius:12, padding:20, ...style }}>{children}</div>;
    const Label = ({ children }) =>
      <div style={{ fontSize:11, color:"#475569", textTransform:"uppercase", letterSpacing:"0.6px", marginBottom:14, fontWeight:600 }}>{children}</div>;
    const Spin = () =>
      <span style={{ display:"inline-block", animation:"spin 1s linear infinite", marginRight:6 }}>⟳</span>;
    const Loading = ({ msg }) =>
      <div style={{ color:"#475569", fontSize:13, padding:"14px 0", display:"flex", alignItems:"center" }}><Spin />{msg}</div>;
    const ErrMsg = ({ msg }) =>
      <div style={{ color:"#ef4444", fontSize:11, padding:10, background:"rgba(239,68,68,0.08)", borderRadius:8, border:"1px solid rgba(239,68,68,0.2)", marginTop:8, wordBreak:"break-all", lineHeight:1.6, whiteSpace:"pre-wrap" }}>⚠ {msg}</div>;

    // ====== SVG PRICE CHART ======
    function PriceChart({ data }) {
      if (!data || data.length < 4) return null;
      const W = 1000, H = 280, PL = 50, PR = 10, PT = 10, PB = 30;
      const cw = W - PL - PR, ch = H - PT - PB;
      const prices = data.map(d => d.price);
      const min = Math.min(...prices) * 0.97;
      const max = Math.max(...prices) * 1.03;
      const xStep = cw / (data.length - 1);
      const pts = data.map((d, i) => ({
        x: PL + i * xStep,
        y: PT + ch - ((d.price - min) / (max - min)) * ch,
        ...d
      }));
      const linePath = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");
      const areaPath = `${linePath} L ${PL + cw} ${PT + ch} L ${PL} ${PT + ch} Z`;
      const labelStep = Math.max(1, Math.floor(pts.length / 7));

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:280 }} preserveAspectRatio="none">
          <defs>
            <linearGradient id="chart-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.35" />
              <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
            </linearGradient>
          </defs>
          {[0, 0.25, 0.5, 0.75, 1].map(t => {
            const y = PT + ch * (1 - t);
            const val = (min + (max - min) * t).toFixed(0);
            return (
              <g key={t}>
                <line x1={PL} y1={y} x2={PL + cw} y2={y} stroke="#1a2744" strokeDasharray="3 3" />
                <text x={PL - 5} y={y + 3} fill="#475569" fontSize="10" textAnchor="end">${val}</text>
              </g>
            );
          })}
          {pts.filter((_, i) => i % labelStep === 0).map((p, i) =>
            <text key={i} x={p.x} y={H - 10} fill="#475569" fontSize="10" textAnchor="middle">{p.date}</text>
          )}
          <path d={areaPath} fill="url(#chart-grad)" />
          <path d={linePath} fill="none" stroke="#3b82f6" strokeWidth="2" />
          {pts.length <= 30 && pts.map((p, i) =>
            <circle key={i} cx={p.x} cy={p.y} r="2" fill="#3b82f6" />
          )}
        </svg>
      );
    }

    // ====== RECOMMENDATION TRENDS CHART (stacked bars) ======
    function RecommendationChart({ data }) {
      if (!data || data.length === 0) return null;
      const sorted = [...data].sort((a, b) => (a.period || "").localeCompare(b.period || ""));

      const W = 600, H = 220, PL = 30, PR = 10, PT = 18, PB = 36;
      const cw = W - PL - PR, ch = H - PT - PB;

      const totals = sorted.map(d => d.strongBuy + d.buy + d.hold + d.sell + d.strongSell);
      const maxTotal = Math.max(...totals, 1);

      const slotW = cw / sorted.length;
      const barW  = Math.min(slotW * 0.65, 60);

      const segOrder = ["strongSell", "sell", "hold", "buy", "strongBuy"];

      // y axis ticks (3 levels)
      const yTicks = [0, 0.5, 1].map(t => ({
        t,
        y: PT + ch * (1 - t),
        v: Math.round(maxTotal * t),
      }));

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:220 }}>
          {/* grid */}
          {yTicks.map(({ y, v, t }) => (
            <g key={t}>
              <line x1={PL} y1={y} x2={PL + cw} y2={y} stroke="#1a2744" strokeDasharray="3 3" />
              <text x={PL - 5} y={y + 3} fill="#475569" fontSize="10" textAnchor="end">{v}</text>
            </g>
          ))}
          {/* bars */}
          {sorted.map((d, i) => {
            const total = d.strongBuy + d.buy + d.hold + d.sell + d.strongSell;
            const xCenter = PL + (i + 0.5) * slotW;
            const x = xCenter - barW / 2;
            const baseY = PT + ch;
            let cursorY = baseY;
            return (
              <g key={i}>
                {segOrder.map(key => {
                  const val = d[key];
                  if (!val) return null;
                  const segH = (val / maxTotal) * ch;
                  const segY = cursorY - segH;
                  cursorY = segY;
                  return (
                    <rect key={key} x={x} y={segY} width={barW} height={segH} fill={REC_COLORS[key]} rx="1">
                      <title>{`${REC_LABELS[key]}: ${val} (${fmtPeriod(d.period)})`}</title>
                    </rect>
                  );
                })}
                {/* total above */}
                <text x={xCenter} y={baseY - (total / maxTotal) * ch - 5} fill="#94a3b8" fontSize="10" fontWeight="600" textAnchor="middle">{total}</text>
                {/* period below */}
                <text x={xCenter} y={H - 18} fill="#94a3b8" fontSize="11" textAnchor="middle">{fmtPeriod(d.period)}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    // ====== LEGEND ======
    function RecLegend() {
      const items = ["strongBuy","buy","hold","sell","strongSell"];
      return (
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginTop:10, fontSize:10, color:"#94a3b8" }}>
          {items.map(k => (
            <div key={k} style={{ display:"flex", alignItems:"center", gap:5 }}>
              <span style={{ display:"inline-block", width:10, height:10, borderRadius:2, background:REC_COLORS[k] }} />
              <span>{REC_LABELS[k]}</span>
            </div>
          ))}
        </div>
      );
    }

    // ====== MAIN DASHBOARD ======
    function Dashboard() {
      const [price, setPrice]   = useState(null);
      const [priceE, setPriceE] = useState(null);
      const [priceL, setPriceL] = useState(true);

      const [chart, setChart]   = useState([]);
      const [chartE, setChartE] = useState(null);
      const [chartL, setChartL] = useState(true);

      const [news, setNews]     = useState([]);
      const [newsE, setNewsE]   = useState(null);
      const [newsL, setNewsL]   = useState(true);

      const [recs, setRecs]     = useState([]);
      const [recsE, setRecsE]   = useState(null);
      const [recsL, setRecsL]   = useState(true);

      const [pt, setPt]         = useState(null);
      const [ptE, setPtE]       = useState(null);
      const [ptL, setPtL]       = useState(true);

      const [ts, setTs]         = useState(null);

      const refresh = useCallback(() => {
        setTs(new Date());

        setPriceL(true); setPriceE(null);
        fetchPrice().then(setPrice).catch(e => setPriceE(e.message)).finally(() => setPriceL(false));

        setChartL(true); setChartE(null);
        fetchHistorical().then(setChart).catch(e => setChartE(e.message)).finally(() => setChartL(false));

        setNewsL(true); setNewsE(null);
        fetchNews().then(setNews).catch(e => setNewsE(e.message)).finally(() => setNewsL(false));

        setRecsL(true); setRecsE(null);
        fetchRecommendations().then(setRecs).catch(e => setRecsE(e.message)).finally(() => setRecsL(false));

        setPtL(true); setPtE(null);
        fetchPriceTarget().then(setPt).catch(e => setPtE(e.message)).finally(() => setPtL(false));
      }, []);

      useEffect(() => { refresh(); }, [refresh]);

      const up   = (price?.changePct ?? 0) >= 0;
      const pCol = up ? "#10b981" : "#ef4444";
      const sign = up ? "+" : "";

      // Latest recommendation (recs is sorted newest-first)
      const latest = recs.length ? recs[0] : null;
      const recSummary = latest ? (() => {
        const total = latest.strongBuy + latest.buy + latest.hold + latest.sell + latest.strongSell;
        if (!total) return null;
        const buyish  = latest.strongBuy + latest.buy;
        const sellish = latest.sell + latest.strongSell;
        let consensus = "Hold";
        if (latest.strongBuy >= total * 0.4)   consensus = "Strong Buy";
        else if (buyish      >= total * 0.55)  consensus = "Buy";
        else if (sellish     >= total * 0.5)   consensus = "Sell";
        return { consensus, total, period: latest.period };
      })() : null;

      return (
        <div style={{ minHeight:"100vh", padding:20 }}>
          {/* Header */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, gap:12, flexWrap:"wrap" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:38, height:38, borderRadius:9, background:"linear-gradient(135deg,#6366f1,#8b5cf6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, fontWeight:800, color:"#fff" }}>A</div>
              <div>
                <div style={{ fontSize:17, fontWeight:700, letterSpacing:"-0.3px" }}>Accenture Intelligence Dashboard</div>
                <div style={{ fontSize:11, color:"#475569", marginTop:1 }}>NYSE: ACN · Finnhub + Stooq · {ts ? `Refreshed ${ts.toLocaleTimeString()}` : "Loading…"}</div>
              </div>
            </div>
            <button onClick={refresh} style={{ background:"linear-gradient(135deg,#3b82f6,#6366f1)", border:"none", borderRadius:8, color:"#fff", padding:"9px 18px", fontSize:13, fontWeight:600, cursor:"pointer" }}>↻ Refresh</button>
          </div>

          {/* Price chart */}
          <Card style={{ marginBottom:18 }}>
            <Label>ACN Share Price — 2-Year History (Monthly)</Label>
            {chartL ? <Loading msg="Fetching historical price data…" />
              : chartE ? <ErrMsg msg={`Chart: ${chartE}`} />
              : <PriceChart data={chart} />
            }
          </Card>

          {/* Price stats */}
          <div className="grid-5" style={{ display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:12, marginBottom:18 }}>
            {[
              { lbl:"Current Price", main: price ? fmtMoney(price.price) : "—", sub: price ? `${sign}${price.change.toFixed(2)} (${sign}${price.changePct.toFixed(2)}%)` : null, sCol:pCol, accent:true },
              { lbl:"Day High",   main: price ? fmtMoney(price.high) : "—" },
              { lbl:"Day Low",    main: price ? fmtMoney(price.low)  : "—" },
              { lbl:"Open",       main: price ? fmtMoney(price.open) : "—" },
              { lbl:"Prev Close", main: price ? fmtMoney(price.prevClose) : "—" },
            ].map((s, i) => (
              <div key={i} style={{ background: s.accent ? "linear-gradient(135deg,rgba(59,130,246,0.15),rgba(99,102,241,0.08))" : "#0f1825", border:`1px solid ${s.accent ? "#3b82f6" : "#1a2744"}`, borderRadius:10, padding:"14px 16px" }}>
                <div style={{ fontSize:10, color:"#475569", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:5 }}>{s.lbl}</div>
                {priceL ? <div style={{ color:"#334155", fontSize:12 }}><Spin />loading</div>
                  : <>
                      <div style={{ fontSize: s.accent ? 22 : 15, fontWeight:700, color: s.accent ? "#e2e8f0" : "#94a3b8" }}>{s.main}</div>
                      {s.sub && <div style={{ fontSize:12, color:s.sCol, fontWeight:600, marginTop:2 }}>{s.sub}</div>}
                    </>
                }
              </div>
            ))}
          </div>
          {priceE && <div style={{ marginBottom:12 }}><ErrMsg msg={`Price: ${priceE}`} /></div>}

          {/* Analyst Recommendation Trends — full-width */}
          <Card style={{ marginBottom:18 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>
              <div style={{ fontSize:11, color:"#475569", textTransform:"uppercase", letterSpacing:"0.6px", fontWeight:600 }}>Analyst Recommendations — Monthly Trend</div>
              {recSummary && (
                <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                  <div style={{ fontSize:11, color:"#475569" }}>
                    <span style={{ marginRight:6 }}>Latest:</span>
                    <span style={{ color:"#a5b4fc", fontWeight:700, fontSize:13 }}>{recSummary.consensus}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#475569" }}>
                    {recSummary.total} analysts · {fmtPeriod(recSummary.period)}
                  </div>
                </div>
              )}
            </div>

            {recsL ? <Loading msg="Fetching analyst recommendations from Finnhub…" />
              : recsE ? <ErrMsg msg={`Recommendations: ${recsE}`} />
              : recs.length === 0 ? <div style={{ color:"#334155", fontSize:13 }}>No analyst recommendations available.</div>
              : (
                <>
                  <RecommendationChart data={recs} />
                  <RecLegend />

                  {/* Current breakdown row */}
                  {latest && (
                    <div style={{ marginTop:18, display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:10 }}>
                      {["strongBuy","buy","hold","sell","strongSell"].map(k => (
                        <div key={k} style={{ background:`${REC_COLORS[k]}10`, border:`1px solid ${REC_COLORS[k]}30`, borderRadius:8, padding:"10px 12px", textAlign:"center" }}>
                          <div style={{ fontSize:10, color:"#475569", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:4 }}>{REC_LABELS[k]}</div>
                          <div style={{ fontSize:22, fontWeight:800, color:REC_COLORS[k] }}>{latest[k]}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              )
            }
          </Card>

          {/* News + Price Targets */}
          <div className="grid-news" style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:16, marginBottom:18 }}>
            <Card>
              <Label>Latest News (Finnhub · past 30 days)</Label>
              {newsL ? <Loading msg="Fetching news from Finnhub…" />
                : newsE ? <ErrMsg msg={`News: ${newsE}`} />
                : news.length ? (
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {news.map((item, i) => (
                      <div key={i} style={{ background:"rgba(99,102,241,0.05)", border:"1px solid #1a2744", borderLeft:"3px solid #6366f1", borderRadius:8, padding:"12px 14px" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6, gap:12 }}>
                          <a href={item.url} target="_blank" rel="noreferrer" style={{ fontSize:13, fontWeight:600, color:"#e2e8f0", lineHeight:1.4, flex:1 }}>
                            {item.headline}
                          </a>
                          <span style={{ fontSize:10, color:"#475569", flexShrink:0, whiteSpace:"nowrap" }}>{fmtDate(item.datetime)}</span>
                        </div>
                        {item.summary && (
                          <div style={{ fontSize:12, color:"#94a3b8", lineHeight:1.6 }}>
                            {item.summary.slice(0, 220)}{item.summary.length > 220 ? "…" : ""}
                          </div>
                        )}
                        <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
                          {item.source && <span style={{ fontSize:10, padding:"2px 8px", borderRadius:4, background:"rgba(99,102,241,0.15)", color:"#818cf8" }}>{item.source}</span>}
                          {item.category && <span style={{ fontSize:10, padding:"2px 8px", borderRadius:4, background:"#1a2744", color:"#94a3b8" }}>{item.category}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                ) : <div style={{ color:"#334155", fontSize:13 }}>No news in past 30 days.</div>
              }
            </Card>

            <Card style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <Label>Analyst Price Targets</Label>
              {ptL ? <Loading msg="Fetching price targets…" />
                : ptE ? <ErrMsg msg={`Targets: ${ptE}`} />
                : pt && pt.targetMean ? (
                  <>
                    <div style={{ textAlign:"center", padding:"14px", background:"rgba(99,102,241,0.08)", borderRadius:10, border:"1px solid rgba(99,102,241,0.2)" }}>
                      <div style={{ fontSize:10, color:"#475569", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:6 }}>Mean Target</div>
                      <div style={{ fontSize:28, fontWeight:800, color:"#a5b4fc" }}>${pt.targetMean.toFixed(0)}</div>
                      {price?.price && (
                        <div style={{ fontSize:11, color:"#475569", marginTop:4 }}>
                          {pt.targetMean > price.price ? "+" : ""}{((pt.targetMean - price.price) / price.price * 100).toFixed(1)}% vs current
                        </div>
                      )}
                    </div>
                    {[
                      { l:"Low",    v:pt.targetLow,    c:"#f59e0b" },
                      { l:"Median", v:pt.targetMedian, c:"#3b82f6" },
                      { l:"High",   v:pt.targetHigh,   c:"#10b981" },
                    ].map(t => (
                      <div key={t.l} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #1a2744" }}>
                        <span style={{ fontSize:12, color:"#64748b" }}>{t.l}</span>
                        <span style={{ fontSize:14, fontWeight:700, color:t.c }}>{t.v ? `$${t.v.toFixed(0)}` : "—"}</span>
                      </div>
                    ))}
                    {pt.lastUpdated && (
                      <div style={{ fontSize:10, color:"#475569", textAlign:"center" }}>
                        Last updated: {new Date(pt.lastUpdated).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" })}
                      </div>
                    )}
                  </>
                ) : <div style={{ color:"#334155", fontSize:13 }}>No price target data available.</div>
              }
            </Card>
          </div>

          {/* Footer */}
          <div style={{ fontSize:11, color:"#334155", textAlign:"center", marginTop:20, paddingBottom:10 }}>
            Data: <a href="https://finnhub.io" target="_blank" rel="noreferrer">Finnhub</a> · <a href="https://stooq.com" target="_blank" rel="noreferrer">Stooq</a>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
</body>
</html>
